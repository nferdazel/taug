<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#09090b"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="508" height="508" rx="62" stroke="#27272a" stroke-width="2" fill="none"/>
  
  <!-- T letter - horizontal bar -->
  <rect x="140" y="120" width="232" height="48" rx="8" fill="#fafafa"/>
  
  <!-- T letter - vertical bar -->
