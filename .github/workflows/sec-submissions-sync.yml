name: SEC Submissions Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_ciks:
        description: "Optional comma-separated CIK list override"
        required: false
        type: string
      max_companies:
        description: "Optional cap on number of CIKs to process"
        required: false
        default: "0"
        type: string
      max_filings_per_company:
        description: "Maximum number of recent filings to normalize per company"
        required: false
        default: "3"
        type: string
  schedule:
    - cron: "15 2 * * *"

jobs:
  sec-submissions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run SEC submissions sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          SEC_TARGET_CIKS: ${{ github.event.inputs.target_ciks != '' && github.event.inputs.target_ciks || vars.SEC_TARGET_CIKS }}
          MAX_COMPANIES: ${{ github.event.inputs.max_companies != '' && github.event.inputs.max_companies || '0' }}
          MAX_FILINGS_PER_COMPANY: ${{ github.event.inputs.max_filings_per_company != '' && github.event.inputs.max_filings_per_company || '3' }}
        run: |
          python -m workers.taug_worker.cli sync-sec-submissions --max-companies "$MAX_COMPANIES" --max-filings-per-company "$MAX_FILINGS_PER_COMPANY"
