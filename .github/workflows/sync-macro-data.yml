name: Sync Macro Data (FRED + BPS)

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"  # 6 AM UTC every Monday
  workflow_dispatch:

jobs:
  fred:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync FRED series
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python -m workers.taug_worker.cli sync-fred-series

  bps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync BPS series
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          BPS_API_KEY: ${{ secrets.BPS_API_KEY }}
        run: |
          python -m workers.taug_worker.cli sync-bps-series
