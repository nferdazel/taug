name: Compute Data Quality

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"  # 3 AM UTC daily (after SEC sync)
  workflow_dispatch:

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute data quality
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          python -m workers.taug_worker.cli compute-data-quality

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Data quality computation failed!"
