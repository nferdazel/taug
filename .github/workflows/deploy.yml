name: Build Flutter Web and Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "TWELVE_DATA_API_KEY=${{ secrets.TWELVE_DATA_API_KEY }}" >> .env

      - name: Generate envied bindings
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze Code
        run: flutter analyze

      - name: Run Tests
        run: flutter test --coverage

      - name: Build Flutter Web
        run: flutter build web --wasm --release

      - name: Copy Vercel Config Files
        run: cp vercel.json build/web/vercel.json

      - name: Inject Supabase URL into Vercel config
        run: |
          sed -i "s|https://YOUR_SUPABASE.supabase.co|${{ secrets.SUPABASE_URL }}|g" build/web/vercel.json
          WSS_URL=$(echo "${{ secrets.SUPABASE_URL }}" | sed 's|https://|wss://|')
          sed -i "s|wss://YOUR_SUPABASE.supabase.co|${WSS_URL}|g" build/web/vercel.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} \
            --project ${{ secrets.VERCEL_PROJECT_ID }} \
            --scope ${{ secrets.VERCEL_ORG_ID }} \
            --yes ./build/web
